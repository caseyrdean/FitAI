# Local development only. For any shared or production deployment, use strong
# credentials via env_file / secrets — do not reuse defaults from a public repo.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nutriagent
      POSTGRES_PASSWORD: nutriagent
      POSTGRES_DB: nutriagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
